name: CI

on:
  push:
    branches: [main, 'release/**', 'integration/**']
  pull_request:
    branches: [main, 'release/**']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Build and run unit tests
        run: |
          set -ex
          docker compose build test
          docker compose run --rm test

  coverage:
    name: Coverage
    runs-on: ubuntu-24.04
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - name: Build with coverage and generate report
        run: |
          set -ex
          docker compose build coverage
          docker compose run --rm coverage

  cross-compile:
    name: Cross-Compile
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Cross-compile for ARM targets
        run: |
          set -ex
          docker compose build test
          docker compose run --rm test bash -c '
            echo "=== Verifying environment ===" &&
            pwd && ls -la cmake/ &&
            echo "=== Verifying ARM toolchain ===" &&
            which arm-none-eabi-gcc && arm-none-eabi-gcc --version | head -1 &&
            rm -rf build-xcompile &&
            cmake -B build-xcompile \
              -DCMAKE_TOOLCHAIN_FILE=/project/cmake/arm-none-eabi-toolchain.cmake \
              -DCMAKE_BUILD_TYPE=Debug \
              -DENABLE_CROSS_COMPILE=ON &&
            cmake --build build-xcompile -j$(nproc) &&
            cmake --build build-xcompile --target xcompile_all &&
            echo "=== Cross-compile verification passed ==="
          '

  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Run clang-tidy and format check
        run: |
          set -ex
          docker compose build shell
          docker compose run --rm -T shell bash -c '
            cmake -B build-sa -DCMAKE_BUILD_TYPE=Debug -DENABLE_CLANG_TIDY=ON -DENABLE_MISRA_ANALYSIS=ON &&
            cmake --build build-sa -j$(nproc) 2>&1 | tee build-sa/clang_tidy.log
          '
