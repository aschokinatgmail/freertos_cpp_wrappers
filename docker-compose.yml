services:
  # =======================================================================
  # Mock (unit) tests — GTest/GMock with FreeRTOS mock layer
  # =======================================================================
  test:
    build: .
    image: freertos-cpp-wrappers:latest
    working_dir: /project
    volumes:
      - .:/project
      - build-test-cache:/project/build-test
    command:
      - bash
      - -c
      - |
        cmake -B build-test \
          -DCMAKE_BUILD_TYPE=Debug \
          -DENABLE_CLANG_TIDY=OFF \
          -DENABLE_MISRA_ANALYSIS=OFF && \
        cmake --build build-test -j$$(nproc) && \
        ctest --test-dir build-test \
          --output-on-failure

  # =======================================================================
  # FreeRTOS+POSIX simulation system tests
  # =======================================================================
  sim:
    build: .
    image: freertos-cpp-wrappers:latest
    working_dir: /project
    volumes:
      - .:/project
      - build-sim-cache:/project/build-sim
    command:
      - bash
      - -c
      - |
        cmake -B build-sim \
          -DCMAKE_BUILD_TYPE=Debug \
          -DENABLE_SIMULATION=ON \
          -DENABLE_CLANG_TIDY=OFF \
          -DENABLE_MISRA_ANALYSIS=OFF && \
        cmake --build build-sim -j$$(nproc) && \
        ctest --test-dir build-sim -L simulation --output-on-failure

  # =======================================================================
  # Coverage build + gcovr report
  # =======================================================================
  coverage:
    build: .
    image: freertos-cpp-wrappers:latest
    working_dir: /project
    volumes:
      - .:/project
      - build-cov-cache:/project/build-cov
    mem_limit: 8g
    command:
      - bash
      - -c
      - |
        rm -rf build-cov/CMakeCache.txt build-cov/CMakeFiles && \
        cmake -B build-cov \
          -DCMAKE_BUILD_TYPE=Debug \
          -DENABLE_CLANG_TIDY=OFF \
          -DENABLE_MISRA_ANALYSIS=OFF \
          -DENABLE_COVERAGE=ON && \
        cmake --build build-cov -j2 && \
        ctest --test-dir build-cov \
          --output-on-failure && \
        gcovr --filter 'include/' --filter 'src/' --gcov-ignore-parse-errors negative_hits.warn --print-summary build-cov

  # =======================================================================
  # Both mock + sim in one run (CI gate)
  # =======================================================================
  all:
    build: .
    image: freertos-cpp-wrappers:latest
    working_dir: /project
    volumes:
      - .:/project
    command:
      - bash
      - -c
      - |
        echo "=== Mock tests ===" && \
        rm -rf build-test && \
        cmake -B build-test \
          -DCMAKE_BUILD_TYPE=Debug \
          -DENABLE_CLANG_TIDY=OFF \
          -DENABLE_MISRA_ANALYSIS=OFF && \
        cmake --build build-test -j$$(nproc) && \
        ctest --test-dir build-test \
          --output-on-failure && \
        echo "=== Simulation tests ===" && \
        rm -rf build-sim && \
        cmake -B build-sim \
          -DCMAKE_BUILD_TYPE=Debug \
          -DENABLE_SIMULATION=ON \
          -DENABLE_CLANG_TIDY=OFF \
          -DENABLE_MISRA_ANALYSIS=OFF && \
        cmake --build build-sim -j$$(nproc) && \
        ctest --test-dir build-sim -L simulation --output-on-failure && \
        echo "=== All tests passed ==="

  # =======================================================================
  # ARM cross-compile verification (compile-only, ARM Cortex-M target)
  # =======================================================================
  xcompile:
    build: .
    image: freertos-cpp-wrappers:latest
    working_dir: /project
    volumes:
      - .:/project
    command:
      - bash
      - -c
      - |
        echo "=== Cross-compile verification (ARM Cortex-M) ===" && \
        rm -rf build-xcompile && \
        cmake -B build-xcompile \
          -DCMAKE_TOOLCHAIN_FILE=cmake/arm-none-eabi-toolchain.cmake \
          -DCMAKE_BUILD_TYPE=Debug \
          -DENABLE_CROSS_COMPILE=ON && \
        cmake --build build-xcompile -j$$(nproc) && \
        cmake --build build-xcompile --target xcompile_all && \
        echo "=== Cross-compile verification passed ==="

  # =======================================================================
  # QEMU ARM runtime test (FreeRTOS on ARM Cortex-M via QEMU)
  # =======================================================================
  qemu:
    build: .
    image: freertos-cpp-wrappers:latest
    working_dir: /project
    volumes:
      - .:/project
    command:
      - bash
      - -c
      - |
        echo "=== QEMU ARM runtime test ===" && \
        rm -rf build-qemu && \
        cmake -B build-qemu \
          -DCMAKE_TOOLCHAIN_FILE=cmake/arm-cortex-m3-toolchain.cmake \
          -DCMAKE_BUILD_TYPE=Debug \
          -DENABLE_QEMU_TEST=ON && \
        cmake --build build-qemu -j$$(nproc) && \
        echo "=== Running QEMU test (timeout 30s) ===" && \
        timeout 30 qemu-system-arm \
          -machine mps2-an385 \
          -nographic \
          -kernel build-qemu/tests/qemu/qemu_test 2>&1 | tee build-qemu/qemu_test.log; \
        if grep -q SUCCESS build-qemu/qemu_test.log; then \
          echo "=== QEMU test PASSED ==="; \
        else \
          echo "=== QEMU test FAILED ==="; \
          exit 1; \
        fi

  # =======================================================================
  # Interactive shell for development
  # =======================================================================
  shell:
    build: .
    image: freertos-cpp-wrappers:latest
    working_dir: /project
    volumes:
      - .:/project
      - build-test-cache:/project/build-test
    stdin_open: true
    tty: true
    command: ["bash"]

volumes:
  build-test-cache:
  build-sim-cache:
  build-cov-cache: