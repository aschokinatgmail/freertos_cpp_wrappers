services:
  build:
    build: .
    image: freertos-cpp-wrappers:latest
    command: ["make", "-j$(nproc)"]

  test:
    build: .
    image: freertos-cpp-wrappers:latest
    command: ["ctest", "--verbose", "--output-on-failure"]
    depends_on:
      - build

  coverage:
    build: .
    image: freertos-cpp-wrappers:latest
    command: ["bash", "-c", "cmake -DENABLE_COVERAGE=ON .. && make -j$(nproc) && ctest --verbose --output-on-failure && lcov --rc lcov_branch_coverage=1 --capture --directory . --output-file coverage.info && lcov --rc lcov_branch_coverage=1 --remove coverage.info '/usr/*' '*/tests/*' '*/mocks/*' --output-file coverage.info && python3 /project/scripts/filter_coverage.py coverage.info coverage.info && genhtml --branch-coverage coverage.info --output-directory coverage_report"]
    depends_on:
      - build

  static-analysis:
    build: .
    image: freertos-cpp-wrappers:latest
    command: ["bash", "-c", "cmake --build . --target static-analysis-report"]
    depends_on:
      - build

  validation:
    build: .
    image: freertos-cpp-wrappers:latest
    command: ["bash", "/project/scripts/generate_validation_verification_report.sh", "/project/build"]
    depends_on:
      - build

  docs:
    build: .
    image: freertos-cpp-wrappers:latest
    command: ["bash", "-c", "cmake --build . --target docs"]
    depends_on:
      - build