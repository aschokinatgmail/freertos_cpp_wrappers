services:
  build:
    build: .
    image: freertos-cpp-wrappers:latest
    command: ["bash", "-c", "cmake -B build -S /project && cmake --build build -j$(nproc)"]
    volumes:
      - build-artifacts:/project/build
      - .:/project-src

  test:
    image: freertos-cpp-wrappers:latest
    command: ["bash", "-c", "cd /project/build && ctest --verbose --output-on-failure"]
    volumes:
      - build-artifacts:/project/build
    depends_on:
      build:
        condition: service_completed_successfully

  coverage:
    image: freertos-cpp-wrappers:latest
    command: ["bash", "-c", "cd /project/build && cmake -DENABLE_COVERAGE=ON .. && make -j$(nproc) && ctest --verbose --output-on-failure && lcov --rc lcov_branch_coverage=1 --capture --directory . --output-file coverage.info && lcov --rc lcov_branch_coverage=1 --remove coverage.info '/usr/*' '/project/tests/*' '/project/mocks/*' --output-file coverage.info && python3 /project/scripts/filter_coverage.py coverage.info coverage.info && genhtml --branch-coverage coverage.info --output-directory coverage_report"]
    volumes:
      - build-artifacts:/project/build
      - .:/project-src
    depends_on:
      build:
        condition: service_completed_successfully

  static-analysis:
    image: freertos-cpp-wrappers:latest
    command: ["bash", "-c", "cd /project/build && cmake --build . --target static-analysis-report"]
    volumes:
      - build-artifacts:/project/build
    depends_on:
      build:
        condition: service_completed_successfully

  validation:
    image: freertos-cpp-wrappers:latest
    command: ["bash", "/project/scripts/generate_validation_verification_report.sh", "/project/build"]
    volumes:
      - build-artifacts:/project/build
    depends_on:
      build:
        condition: service_completed_successfully

  docs:
    image: freertos-cpp-wrappers:latest
    command: ["bash", "-c", "cd /project/build && cmake --build . --target docs"]
    volumes:
      - build-artifacts:/project/build
    depends_on:
      build:
        condition: service_completed_successfully

volumes:
  build-artifacts: