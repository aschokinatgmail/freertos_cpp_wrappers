services:
  # =======================================================================
  # Mock (unit) tests — GTest/GMock with FreeRTOS mock layer
  # =======================================================================
  test:
    build: .
    image: freertos-cpp-wrappers:latest
    working_dir: /project
    volumes:
      - .:/project
    command:
      - bash
      - -c
      - |
        rm -rf build-test && \
        cmake -B build-test \
          -DCMAKE_BUILD_TYPE=Debug \
          -DENABLE_CLANG_TIDY=OFF \
          -DENABLE_MISRA_ANALYSIS=OFF && \
        cmake --build build-test -j$$(nproc) && \
        ctest --test-dir build-test \
          -E "coverage_branches2|coverage_sa_ns|coverage_faults" \
          --output-on-failure

  # =======================================================================
  # FreeRTOS+POSIX simulation system tests
  # =======================================================================
  sim:
    build: .
    image: freertos-cpp-wrappers:latest
    working_dir: /project
    volumes:
      - .:/project
    command:
      - bash
      - -c
      - |
        rm -rf build-sim && \
        cmake -B build-sim \
          -DCMAKE_BUILD_TYPE=Debug \
          -DENABLE_SIMULATION=ON \
          -DENABLE_CLANG_TIDY=OFF \
          -DENABLE_MISRA_ANALYSIS=OFF && \
        cmake --build build-sim -j$$(nproc) && \
        ctest --test-dir build-sim -L simulation --output-on-failure

  # =======================================================================
  # Coverage build + gcovr report
  # =======================================================================
  coverage:
    build: .
    image: freertos-cpp-wrappers:latest
    working_dir: /project
    volumes:
      - .:/project
    command:
      - bash
      - -c
      - |
        rm -rf build-cov && \
        cmake -B build-cov \
          -DCMAKE_BUILD_TYPE=Debug \
          -DENABLE_CLANG_TIDY=OFF \
          -DENABLE_MISRA_ANALYSIS=OFF \
          -DENABLE_COVERAGE=ON && \
        cmake --build build-cov -j$$(nproc) && \
        ctest --test-dir build-cov \
          -E "coverage_branches2|coverage_sa_ns|coverage_faults" \
          --output-on-failure && \
        gcovr --filter 'include/' --filter 'src/' --print-summary build-cov

  # =======================================================================
  # Both mock + sim in one run (CI gate)
  # =======================================================================
  all:
    build: .
    image: freertos-cpp-wrappers:latest
    working_dir: /project
    volumes:
      - .:/project
    command:
      - bash
      - -c
      - |
        echo "=== Mock tests ===" && \
        rm -rf build-test && \
        cmake -B build-test \
          -DCMAKE_BUILD_TYPE=Debug \
          -DENABLE_CLANG_TIDY=OFF \
          -DENABLE_MISRA_ANALYSIS=OFF && \
        cmake --build build-test -j$$(nproc) && \
        ctest --test-dir build-test \
          -E "coverage_branches2|coverage_sa_ns|coverage_faults" \
          --output-on-failure && \
        echo "=== Simulation tests ===" && \
        rm -rf build-sim && \
        cmake -B build-sim \
          -DCMAKE_BUILD_TYPE=Debug \
          -DENABLE_SIMULATION=ON \
          -DENABLE_CLANG_TIDY=OFF \
          -DENABLE_MISRA_ANALYSIS=OFF && \
        cmake --build build-sim -j$$(nproc) && \
        ctest --test-dir build-sim -L simulation --output-on-failure && \
        echo "=== All tests passed ==="

  # =======================================================================
  # Interactive shell for development
  # =======================================================================
  shell:
    build: .
    image: freertos-cpp-wrappers:latest
    working_dir: /project
    volumes:
      - .:/project
    stdin_open: true
    tty: true
    command: ["bash"]